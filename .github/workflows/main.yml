name: Generate KDP Books

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate puzzle books
        run: |
          echo "Generating 20 KDP-ready word search books"
          python scripts/main.py --output-dir output --prefix kdp_word_search

      - name: Show generated files
        run: |
          echo "Generated PDFs:"
          find output -maxdepth 2 -type f | sort

      - name: Upload generated books
        uses: actions/upload-artifact@v4
        with:
          name: kdp-books
          path: output/
